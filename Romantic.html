<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💊 和好胶囊 · 专属回忆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #ffe0f0 50%, #f8d7e6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    .container {
      max-width: 420px; width: 100%;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
      border-radius: 40px; box-shadow: 0 25px 50px rgba(255,105,135,0.2);
      padding: 30px 25px; text-align: center;
    }
    h1 { font-size: 26px; color: #d6336c; margin-bottom: 5px; font-weight: 700; letter-spacing: 2px; }
    .sub-title { font-size: 14px; color: #e6739f; margin-bottom: 25px; font-style: italic; }

    .film-viewer {
      width: 100%; height: 300px; border-radius: 24px; background: #1a1a1a;
      overflow: hidden; position: relative; margin: 20px 0;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    }
    .film-viewer::before, .film-viewer::after {
      content: ''; position: absolute; left: 0; width: 100%; height: 18px;
      background: repeating-linear-gradient(90deg, #222 0px, #222 8px, transparent 8px, transparent 16px);
      z-index: 5; pointer-events: none;
    }
    .film-viewer::before { top: 0; }
    .film-viewer::after { bottom: 0; }
    .film-strip {
      display: flex; height: 100%; align-items: center; position: absolute; top: 0; left: 0;
      will-change: transform;
    }
    .film-strip img {
      height: 85%; max-height: 250px; width: auto; margin: 0 8px;
      border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      border: 2px solid #ffd1dc; background: #fff; object-fit: cover; min-width: 160px;
    }

    .coupon-section { display: none; animation: fadeInUp 0.6s ease; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .coupon-card {
      background: linear-gradient(145deg, #fff5f8, #ffe0ec); border-radius: 30px;
      padding: 30px 20px; margin: 20px 0; border: 2px solid #ffb3c6;
      box-shadow: 0 15px 30px rgba(255,105,135,0.2);
    }
    .coupon-title { font-size: 24px; color: #d6336c; font-weight: 700; margin-bottom: 10px; }
    .coupon-desc { font-size: 15px; color: #555; margin-bottom: 25px; }
    .forgive-btn {
      background: #ff4d6d; font-size: 18px; padding: 15px 35px; border: none; color: white;
      border-radius: 50px; font-weight: 600; letter-spacing: 1px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,77,109,0.4); animation: pulse 1.8s infinite;
      width: 80%; margin: 0 auto;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,77,109,0.5); }
      70% { box-shadow: 0 0 0 15px rgba(255,77,109,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); }
    }

    .used-section { display: none; }
    .used-icon { font-size: 70px; margin-bottom: 15px; }
    .loading-text { color: #d6336c; font-size: 16px; margin: 20px 0; }
    .error-text { color: #999; font-size: 14px; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 加载中 -->
    <div id="loadingSection">
      <h1>💊 和好胶囊</h1>
      <p class="loading-text">正在加载你们的回忆...</p>
    </div>

    <!-- 胶卷播放区 -->
    <div id="filmSection" style="display: none;">
      <h1>🎞️ 属于你们的回忆</h1>
      <div class="film-viewer" id="filmViewer">
        <div class="film-strip" id="filmStrip"></div>
      </div>
      <p class="sub-title" id="filmHint">回忆正在缓缓展开...</p>
    </div>

    <!-- 和好券 -->
    <div id="couponSection" class="coupon-section" style="display: none;">
      <h1>💊 和好胶囊</h1>
      <div class="coupon-card">
        <div class="coupon-title">专属和好券</div>
        <div class="coupon-desc">看完我们的回忆，<br>你愿意给彼此一个重新开始的机会吗？</div>
        <button class="forgive-btn" id="forgiveBtn">💖 原谅TA，点击和好</button>
      </div>
    </div>

    <!-- 已使用 -->
    <div id="usedSection" class="used-section" style="display: none;">
      <div class="used-icon">🌸</div>
      <h1>和好成功！</h1>
      <p style="color:#666; margin: 15px 0;">这份回忆和好券已经被珍藏<br>你们已经和好如初啦 💕</p>
      <p style="font-size: 14px; color: #999;">往后的日子，也要彼此珍惜</p>
    </div>

    <!-- 错误 -->
    <div id="errorSection" style="display: none;">
      <h1>😔</h1>
      <p class="error-text">这个链接好像不太对<br>可能已经过期或者无效了</p>
    </div>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const STORAGE_KEY_USED = `capsule_used_${token}`;
      const STORAGE_KEY_PHOTOS = `photos_${token}`;

      const loadingSection = document.getElementById('loadingSection');
      const filmSection = document.getElementById('filmSection');
      const couponSection = document.getElementById('couponSection');
      const usedSection = document.getElementById('usedSection');
      const errorSection = document.getElementById('errorSection');
      const filmViewer = document.getElementById('filmViewer');
      const filmStrip = document.getElementById('filmStrip');
      const filmHint = document.getElementById('filmHint');
      const forgiveBtn = document.getElementById('forgiveBtn');

      // 检查 token
      if (!token) {
        loadingSection.style.display = 'none';
        errorSection.style.display = 'block';
        return;
      }

      // 检查是否已使用
      if (localStorage.getItem(STORAGE_KEY_USED) === 'used') {
        loadingSection.style.display = 'none';
        usedSection.style.display = 'block';
        return;
      }

      // 读取照片数据
      const photosData = localStorage.getItem(STORAGE_KEY_PHOTOS);
      if (!photosData) {
        loadingSection.style.display = 'none';
        errorSection.style.display = 'block';
        return;
      }

      let images = [];
      try {
        images = JSON.parse(photosData);
      } catch(e) {
        loadingSection.style.display = 'none';
        errorSection.style.display = 'block';
        return;
      }

      if (images.length === 0) {
        loadingSection.style.display = 'none';
        errorSection.style.display = 'block';
        return;
      }

      // 加载照片
      loadingSection.style.display = 'none';
      filmSection.style.display = 'block';

      const imgElements = [];
      images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.style.display = 'block';
        filmStrip.appendChild(img);
        imgElements.push(img);
      });

      // 强制等待所有图片加载完成，再开始动画
      let loadedCount = 0;
      const totalCount = imgElements.length;

      function onImageLoad() {
        loadedCount++;
        if (loadedCount >= totalCount) {
          // 所有图片加载完毕，再延迟100ms确保布局计算完成
          setTimeout(startAnimation, 100);
        }
      }

      imgElements.forEach(img => {
        if (img.complete) {
          onImageLoad();
        } else {
          img.addEventListener('load', onImageLoad);
          img.addEventListener('error', onImageLoad); // 即使加载失败也继续
        }
      });

      // 兜底：2秒后如果还没开始，强制执行
      setTimeout(() => {
        if (loadedCount < totalCount) {
          loadedCount = totalCount;
          startAnimation();
        }
      }, 2000);

      function startAnimation() {
        const stripWidth = filmStrip.scrollWidth;
        const viewerWidth = filmViewer.clientWidth;

        // 如果宽度计算为0，再等一会儿
        if (stripWidth === 0 || viewerWidth === 0) {
          setTimeout(startAnimation, 200);
          return;
        }

        const photoCount = images.length;
        let duration = photoCount * 2.5;
        if (duration < 8) duration = 8;
        if (duration > 25) duration = 25;

        filmStrip.style.transition = 'none';
        filmStrip.style.transform = `translateX(${viewerWidth}px)`;
        // 强制回流
        filmStrip.offsetHeight;

        filmHint.textContent = '回忆缓缓展开，那些美好从未离开...';
        filmStrip.style.transition = `transform ${duration}s linear`;
        filmStrip.style.transform = `translateX(-${stripWidth}px)`;

        setTimeout(() => {
          filmSection.style.display = 'none';
          couponSection.style.display = 'block';
        }, duration * 1000 + 500);
      }

      // 使用和好券
      forgiveBtn.addEventListener('click', () => {
        localStorage.setItem(STORAGE_KEY_USED, 'used');
        couponSection.style.display = 'none';
        usedSection.style.display = 'block';
      });

    })();
  </script>
</body>
</html>
